name: OrangeHRM Regression

on:
  push:
    branches:
      - slack-integration

  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: qa
        type: choice
        options:
          - qa
          - dev
          - uat
          - prod

      notifySlack:
        description: "Notify Slack"
        required: true
        default: true
        type: boolean
jobs:
  regression:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Automation
        run: npm run qa:headless

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: npm run notify:slack